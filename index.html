<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Auto Agent</title>
  <style>
 @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');

body {
  font-family: 'Inter', sans-serif;
  max-width: 650px;
  margin: 40px auto;
  padding: 20px;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: #e5e7eb;
}

h1 {
  text-align: center;
  color: #38bdf8;
  font-weight: 700;
  letter-spacing: 1px;
  margin-bottom: 20px;
  text-shadow: 0 0 10px rgba(56,189,248,0.4);
}

/* Chat container */
#chat {
  background: rgba(255, 255, 255, 0.05);
  border: 1px solid rgba(56,189,248,0.2);
  border-radius: 14px;
  height: 420px;
  overflow-y: auto;
  padding: 16px;
  backdrop-filter: blur(10px);
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

/* User message */
.user-msg {
  background: linear-gradient(135deg, #2563eb, #38bdf8);
  color: white;
  padding: 10px 14px;
  border-radius: 14px 14px 0 14px;
  margin: 10px 0;
  text-align: right;
  max-width: 80%;
  margin-left: auto;
  box-shadow: 0 4px 12px rgba(56,189,248,0.2);
}

/* Bot message */
.bot-msg {
  background: rgba(255,255,255,0.08);
  color: #e5e7eb;
  padding: 10px 14px;
  border-radius: 14px 14px 14px 0;
  margin: 10px 0;
  max-width: 80%;
  border: 1px solid rgba(255,255,255,0.1);
}

/* Loading */
.loading {
  color: #94a3b8;
  font-style: italic;
}

/* Input row */
#input-row {
  display: flex;
  gap: 10px;
  margin-top: 12px;
}

/* Input */
input {
  flex: 1;
  padding: 12px 14px;
  border-radius: 12px;
  border: 1px solid rgba(56,189,248,0.3);
  background: rgba(255,255,255,0.05);
  color: white;
  outline: none;
}

input::placeholder {
  color: #94a3b8;
}

/* Button */
button {
  padding: 12px 18px;
  border: none;
  border-radius: 12px;
  background: linear-gradient(135deg, #38bdf8, #2563eb);
  color: white;
  font-weight: 600;
  cursor: pointer;
  transition: 0.3s ease;
  box-shadow: 0 5px 15px rgba(56,189,248,0.3);
}

button:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 20px rgba(56,189,248,0.4);
}
  </style>
</head>
<body>
  <h1>🚗 Auto Agent</h1>
  <div id="chat"></div>
  <div id="input-row">
    <input id="msg" type="text" placeholder="Ex: Je cherche une voiture avec un budget de 80000 DT..." />
    <button onclick="sendMessage()">Envoyer</button>
  </div>

  <script>
    const WEBHOOK_URL = "http://localhost:5678/webhook/cars";

    async function sendMessage() {
      const input = document.getElementById("msg");
      const chat = document.getElementById("chat");
      const message = input.value.trim();
      if (!message) return;

      // Show user message
      chat.innerHTML += `<div class="user-msg">${message}</div>`;
      input.value = "";

      // Show loading
      chat.innerHTML += `<div class="bot-msg loading" id="loading">En train de chercher...</div>`;
      chat.scrollTop = chat.scrollHeight;

      try {
        const res = await fetch(WEBHOOK_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message })
        });

        const data = await res.json();

        // Remove loading and show response
        document.getElementById("loading").remove();
        chat.innerHTML += `<div class="bot-msg">${data.response}</div>`;
      } catch (err) {
        document.getElementById("loading").remove();
        chat.innerHTML += `<div class="bot-msg">Erreur de connexion. Vérifiez que n8n est lancé.</div>`;
      }

      chat.scrollTop = chat.scrollHeight;
    }

    // Send on Enter key
    document.getElementById("msg").addEventListener("keypress", function(e) {
      if (e.key === "Enter") sendMessage();
    });
  </script>
</body>
</html>
